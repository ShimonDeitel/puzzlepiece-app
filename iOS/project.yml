name: Puzzle Piece
options:
  bundleIdPrefix: com.shimondeitel.puzzlepiece
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Puzzle Piece:
    type: application
    platform: iOS
    sources:
      - path: Puzzle Piece
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puzzlepiece
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Puzzle Piece/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Puzzle PieceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Puzzle PieceTests
      - path: Puzzle Piece.storekit
    dependencies:
      - target: Puzzle Piece
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puzzlepiece.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Puzzle PieceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Puzzle PieceUITests
    dependencies:
      - target: Puzzle Piece
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puzzlepiece.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Puzzle Piece:
    build:
      targets:
        Puzzle Piece: all
        Puzzle PieceTests: [test]
        Puzzle PieceUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Puzzle Piece.storekit
    test:
      config: Debug
      storeKitConfiguration: Puzzle Piece.storekit
      targets:
        - Puzzle PieceTests
        - Puzzle PieceUITests
    archive:
      config: Release
